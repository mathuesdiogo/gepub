services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env.docker.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker.prod
    environment:
      PORT: 8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WAIT_FOR_REDIS: 1
      COLLECTSTATIC_ON_START: 1
    command: ["web"]
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    volumes:
      - media_data:/app/media
      - staticfiles_data:/app/staticfiles

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker.prod
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WAIT_FOR_REDIS: 1
    command: ["worker"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    volumes:
      - media_data:/app/media

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker.prod
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WAIT_FOR_REDIS: 1
    command: ["beat"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    volumes:
      - media_data:/app/media

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.docker.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    env_file:
      - .env.docker.prod
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: "production"
    volumes:
      - meili_data:/meili_data

volumes:
  postgres_data:
  redis_data:
  meili_data:
  media_data:
  staticfiles_data:
  caddy_data:
  caddy_config:
