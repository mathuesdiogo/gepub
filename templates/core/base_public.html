{% load static %}

<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}GEPUB{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'gepub-design-system/gepub-design-system.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/fontawesome/css/all.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <link rel="stylesheet" href="{% static 'css/components/cookie-consent.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body class="public-body">

  {% if messages %}
    <div class="public-flash">
      <div class="flash-stack alert-stack">
        {% for message in messages %}
          <div class="flash flash--{{ message.tags }} alert gp-alert alert--{{ message.tags }}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    </div>
  {% endif %}

  {% block content %}{% endblock %}

  {% include "core/partials/cookie_consent.html" %}

  <script src="{% static 'js/ds-style-bindings.js' %}"></script>
  <script src="{% static 'js/gepub-design-system.js' %}"></script>
  <script src="{% static 'js/cookie-consent.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
