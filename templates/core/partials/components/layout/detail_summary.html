{# core/partials/components/layout/detail_summary.html #}

{% if pills %}
  <ul class="chips pills">
    {% for p in pills %}
      <li>
        <span class="pill{% if p.variant %} pill--{{ p.variant }}{% endif %}">
          {% if p.label %}<strong>{{ p.label }}:</strong>{% endif %}
          {{ p.value }}
        </span>
      </li>
    {% endfor %}
  </ul>
{% endif %}

{% if fields %}
  <section class="detail-summary detail-summary--structured gp-card" aria-label="Resumo de informações">
    <dl class="detail-summary__list gp-card__body">
      {% for f in fields %}
        <div class="detail-summary__row">
          <dt class="detail-summary__label gp-caption">{{ f.label }}</dt>
          <dd class="detail-summary__value">
            {{ f.value|default:"—" }}
          </dd>
        </div>
      {% endfor %}
    </dl>
  </section>
{% endif %}
