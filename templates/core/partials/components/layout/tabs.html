{# Tabs (SUAP-like) #}
{% if items %}
  <ul class="nav nav-tabs tabs" aria-label="{{ aria_label|default:'Navegação' }}">
    {% for it in items %}
      <li class="{% if it.active %}active{% endif %}{% if it.disabled %} disabled{% endif %}">
        <a
          class="tabs__item {% if it.active %}is-active{% endif %}"
          href="{% if it.disabled %}#{% else %}{{ it.url }}{% endif %}"
          {% if it.title %}title="{{ it.title }}"{% endif %}
          {% if it.disabled %}aria-disabled="true" tabindex="-1"{% endif %}
          {% if it.aria_current %}aria-current="page"{% elif it.active %}aria-current="page"{% endif %}
        >
          <span class="tabs__label">{{ it.label }}</span>
          {% if it.count != None %}
            <span class="tabs__badge">{{ it.count }}</span>
          {% endif %}
        </a>
      </li>
    {% endfor %}
  </ul>
{% endif %}
