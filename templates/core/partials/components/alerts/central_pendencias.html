<section class="admin-panel u-mb-16">
  <div class="admin-panel__head">
    <div>
      <h3 class="admin-panel__title">Central de pendências</h3>
      <p class="admin-panel__sub">{{ total }} alerta(s) com impacto operacional.</p>
    </div>
  </div>
  <div class="table-shell gp-table gp-table--responsive"><div class="table-shell__body gp-table__body">
    <table class="gp-table__native table">
      <thead>
        <tr>
          <th>Prioridade</th>
          <th>Pendência</th>
          <th>Quantidade</th>
          <th>Descrição</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody>
        {% for item in items %}
          <tr>
            <td>{% if item.nivel == "alto" %}Alta{% else %}Média{% endif %}</td>
            <td>{{ item.titulo }}</td>
            <td>{{ item.valor }}</td>
            <td>{{ item.descricao }}</td>
            <td><a href="{{ item.url }}">Visualizar</a></td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div></div>
</section>
