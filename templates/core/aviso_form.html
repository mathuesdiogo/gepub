{% extends "core/base.html" %}
{% load gepub_design_system %}
{% block title %}Novo aviso • GEPUB{% endblock %}
{% block header %}Novo aviso{% endblock %}

{% block content %}
<div class="card u-max-900 gp-card">
  <div class="card__title">Publicar aviso</div>
  <div class="card__body gp-card__body">
    <form method="post" class="u-grid-gap-12 form-shell">
      {% csrf_token %}
      {% render_form form %}
      <div class="u-flex u-gap-10">
        <button type="submit">Publicar</button>
        <a class="gp-button gp-button--outline" href="{% url 'core:dashboard' %}">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
