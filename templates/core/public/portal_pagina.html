{% extends "core/public/base_portal_tenant.html" %}

{% block hero_text %}
  {% if item.resumo %}<p>{{ item.resumo }}</p>{% endif %}
{% endblock %}

{% block page_content %}
<section class="pp-card gp-card">
  <h2>{{ item.titulo }}</h2>
  {% if item.resumo %}<p class="pp-content-lead">{{ item.resumo }}</p>{% endif %}
  <div class="pp-content-text">{{ item.conteudo }}</div>
</section>
{% endblock %}
