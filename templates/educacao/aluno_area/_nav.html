<nav class="gp-student-area-nav" aria-label="Navegação da área do aluno">
  <ul class="pills">
    {% for item in student_nav %}
      <li class="{% if student_nav_active == item.key %}active{% endif %}">
        <a class="{% if student_nav_active == item.key %}is-active{% endif %}" href="{{ item.url }}" {% if student_nav_active == item.key %}aria-current="page"{% endif %}>
          <i class="{{ item.icon }}" aria-hidden="true"></i>
          <span>{{ item.label }}</span>
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
