<nav class="gp-student-area-nav gp-pills" aria-label="Navegação da área do aluno">
  {% for item in student_nav %}
    <a class="gp-pills__item {% if student_nav_active == item.key %}is-active{% endif %}" href="{{ item.url }}">
      <i class="{{ item.icon }}" aria-hidden="true"></i>
      <span>{{ item.label }}</span>
    </a>
  {% endfor %}
</nav>
