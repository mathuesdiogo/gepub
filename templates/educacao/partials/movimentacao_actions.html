{% if row.can_undo %}
  <form method="post" class="u-inline-flex u-items-center u-gap-6 u-inline-form">
    {% csrf_token %}
    <input type="hidden" name="_action" value="undo_mov_matricula">
    <input type="hidden" name="movimentacao_id" value="{{ row.movimentacao_id }}">
    <input type="hidden" name="matricula_id" value="{{ row.matricula_id }}">
    <button type="submit" class="gp-button gp-button--ghost">
      <i class="fa-solid fa-rotate-left" aria-hidden="true"></i>
      Desfazer
    </button>
  </form>
{% else %}—{% endif %}
